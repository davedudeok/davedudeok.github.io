<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dino Dash</title>
    <style>
        body { margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; background: #f0f0f0; font-family: sans-serif; overflow: hidden; }
        #game-container { width: 600px; height: 200px; background: white; border-bottom: 2px solid #333; position: relative; overflow: hidden; }
        #dino { width: 50px; height: 50px; background: #333; position: absolute; bottom: 0; left: 50px; border-radius: 5px; }
        .cactus { width: 30px; height: 50px; background: #e74c3c; position: absolute; bottom: 0; right: -30px; border-radius: 5px 5px 0 0; }
        .jump { animation: jump 0.5s linear; }
        @keyframes jump { 0% { bottom: 0; } 30% { bottom: 100px; } 70% { bottom: 100px; } 100% { bottom: 0; } }
        @keyframes move { from { right: -30px; } to { right: 100%; } }
        .cactus-move { animation: move 1.5s infinite linear; }
    </style>
</head>
<body>
    <div id="game-container">
        <div id="dino"></div>
        <div id="cactus" class="cactus cactus-move"></div>
    </div>

    <script>
        const dino = document.getElementById("dino");
        const cactus = document.getElementById("cactus");

        document.addEventListener("keydown", (e) => {
            if (e.code === "Space") {
                if (!dino.classList.contains("jump")) {
                    dino.classList.add("jump");
                    setTimeout(() => dino.classList.remove("jump"), 500);
                }
            }
        });

        let checkDead = setInterval(() => {
            let dinoTop = parseInt(window.getComputedStyle(dino).getPropertyValue("top"));
            let cactusLeft = parseInt(window.getComputedStyle(cactus).getPropertyValue("left"));
            if (cactusLeft < 50 && cactusLeft > 0 && dinoTop >= 150) {
                cactus.classList.remove("cactus-move");
                alert("Game Over!");
                cactus.classList.add("cactus-move");
            }
        }, 10);
    </script>
</body>
</html>
